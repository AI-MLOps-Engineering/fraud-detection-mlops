name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Tests & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt pytest httpx

      - name: Run tests
        env:
          MLFLOW_TRACKING_URI: http://localhost:5000
        run: pytest tests/ -v --rootdir=.

      - name: Build Docker image
        run: docker build -t fraud-detection-api:latest .

      - name: Test Docker image builds correctly
        run: |
          echo "✅ Image built successfully"
          docker image inspect fraud-detection-api:latest
          docker run --rm fraud-detection-api:latest python -c "
          import fastapi, mlflow, xgboost, pandas, prometheus_client
          print('✅ All imports OK')
          "